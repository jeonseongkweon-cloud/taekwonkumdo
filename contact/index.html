<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>신청·문의 | 세계태권검도연맹</title>
  <meta name="description" content="지부/지도자/세미나 신청 및 문의." />
  <meta name="theme-color" content="#0b0f19" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <script defer src="../assets/js/app.js"></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="../"><span class="mark"></span><div class="brand-text"><strong>세계태권검도연맹</strong><span>Taekwon Kumdo Federation</span></div></a>
    <nav class="nav">
      <a href="../about/">연맹소개</a>
      <a href="../philosophy/">철학</a>
      <a href="../program/">프로그램</a>
      <a href="../masters/">임원·지도자</a>
      <a href="../branches/">지부</a>
      <a class="pill" href="../verification/">조회</a>
      <a class="pill" href="../resources/">자료실</a>
      <a class="active" href="../contact/">문의</a>
    </nav>
    <button class="nav-toggle" aria-label="메뉴 열기" data-nav-toggle>☰</button>
  </header>

  <main class="container page">
    <header class="page-head">
      <h1>신청·문의</h1>
      <p class="lead">지부/지도자/세미나/공식지정도장 신청 및 문의를 받습니다.</p>
    </header>

    <section class="grid2">
      <article class="card">
        <h2>연락처</h2>
        <ul class="list">
          <li><strong>이메일</strong>: (추가 예정)</li>
          <li><strong>전화</strong>: (추가 예정)</li>
          <li><strong>오픈채팅</strong>: (추가 예정)</li>
        </ul>
        <p class="muted">※ 실제 정보로 교체해 주세요.</p>
      </article>

      <article class="card">
        <h2>빠른 신청 양식(간단)</h2>
        <form class="form" onsubmit="return false;">
          <label>이름/기관명<input type="text" placeholder="예) ○○도장 / 홍길동" /></label>
          <label>연락처<input type="text" placeholder="전화 또는 이메일" /></label>
          <label>문의 유형
            <select>
              <option>지부 신청</option>
              <option>공식지정도장 신청</option>
              <option>지도자 과정</option>
              <option>세미나/행사</option>
              <option>기타</option>
            </select>
          </label>
          <label>내용<textarea rows="5" placeholder="문의 내용을 적어주세요."></textarea></label>
          <button class="btn primary" type="button">제출(추후 연결)</button>
          <p class="muted">이 폼은 현재 저장 기능이 없습니다. (구글폼/메일링으로 연결 가능)</p>
        </form>
      </article>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-grid">
      <div><strong>세계태권검도연맹</strong><p class="muted">Taekwon Kumdo Federation</p></div>
      <div class="muted">© <span data-year></span></div>
    </div>
  </footer>
</body>
</html>
